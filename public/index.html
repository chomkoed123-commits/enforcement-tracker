<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ระบบติดตามงานบังคับคดี</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a;--bg2:#0f1629;--bg3:#141c35;--bg4:#1a2340;
  --border:#1e2d50;--border2:#2a3d6b;
  --text:#e8edf8;--text2:#8fa3cc;--text3:#5a7099;
  --accent:#3b82f6;--accent2:#60a5fa;
  --gold:#f59e0b;--gold2:#fbbf24;
  --green:#10b981;--green2:#34d399;
  --red:#ef4444;--red2:#f87171;
  --orange:#f97316;--purple:#8b5cf6;
  --mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Sans Thai',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}

/* HEADER */
.header{background:linear-gradient(135deg,#0f1629,#0d1b3e,#0a1628);border-bottom:1px solid var(--border2);padding:14px 24px;position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap;}
.badge{background:linear-gradient(135deg,var(--gold),#d97706);color:#000;font-family:var(--mono);font-weight:600;font-size:10px;padding:3px 9px;border-radius:4px;letter-spacing:1px;}
.header h1{font-size:18px;font-weight:700;} .header h1 span{color:var(--accent2);}
.header-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.sync-status{font-size:11px;font-family:var(--mono);padding:4px 10px;border-radius:5px;border:1px solid var(--border2);color:var(--text3);}
.sync-status.ok{color:var(--green2);border-color:rgba(16,185,129,.4);}
.sync-status.err{color:var(--red2);border-color:rgba(239,68,68,.4);}
.sync-status.loading{color:var(--gold2);border-color:rgba(245,158,11,.4);}

/* KPI */
.kpi-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;}
.kpi{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.kpi.blue::before{background:var(--accent)} .kpi.gold::before{background:var(--gold)}
.kpi.green::before{background:var(--green)} .kpi.red::before{background:var(--red)}
.kpi.orange::before{background:var(--orange)} .kpi.purple::before{background:var(--purple)}
.kpi-label{font-size:10px;color:var(--text3);margin-bottom:2px;}
.kpi-value{font-family:var(--mono);font-size:19px;font-weight:700;line-height:1;}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:1px;}
.kpi.blue .kpi-value{color:var(--accent2)} .kpi.gold .kpi-value{color:var(--gold2)}
.kpi.green .kpi-value{color:var(--green2)} .kpi.red .kpi-value{color:var(--red2)}
.kpi.orange .kpi-value{color:var(--orange)} .kpi.purple .kpi-value{color:var(--purple)}

/* TOOLBAR */
.toolbar{display:flex;gap:8px;align-items:center;padding:9px 24px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.search-wrap{position:relative;flex:1;min-width:160px;}
.search-wrap input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:6px 10px 6px 30px;color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border-color .2s;}
.search-wrap input:focus{border-color:var(--accent);}
.search-wrap::before{content:'🔍';position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none;}
select,input[type=date]{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:6px 9px;color:var(--text);font-family:inherit;font-size:13px;cursor:pointer;outline:none;}
select:focus,input[type=date]:focus{border-color:var(--accent);}
.btn{padding:6px 12px;border-radius:6px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
.btn-primary{background:var(--accent);color:#fff;} .btn-primary:hover{background:#2563eb;}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border2);} .btn-ghost:hover{border-color:var(--accent);color:var(--accent2);}
.btn-gold{background:var(--gold);color:#000;font-weight:600;} .btn-gold:hover{background:var(--gold2);}
.btn-green{background:var(--green);color:#fff;font-weight:600;} .btn-green:hover{background:#059669;}
.btn-red{background:var(--red);color:#fff;} .btn-red:hover{background:#dc2626;}
.btn-sm{padding:4px 8px;font-size:11px;}
.count-badge{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:6px 10px;font-family:var(--mono);font-size:12px;color:var(--text2);white-space:nowrap;}
.count-badge span{color:var(--accent2);font-weight:600;}

/* TABS */
.view-tabs{display:flex;padding:0 24px;background:var(--bg2);border-bottom:1px solid var(--border);}
.tab-btn{padding:8px 15px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;}
.tab-btn:hover{color:var(--text2)} .tab-btn.active{color:var(--accent2);border-bottom-color:var(--accent);}

/* MAIN */
.main{padding:14px 24px 40px;}

/* TABLE */
.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;min-width:1060px;}
thead{background:var(--bg3);}
th{padding:8px 10px;text-align:left;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid var(--border2);white-space:nowrap;cursor:pointer;user-select:none;}
th:hover{color:var(--text2)} th.sorted{color:var(--accent2);}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;cursor:pointer;}
tbody tr:hover{background:rgba(59,130,246,.06);}
tbody tr:last-child{border-bottom:none;}
tbody tr.overdue-row{background:rgba(239,68,68,.03);}
td{padding:7px 10px;font-size:13px;color:var(--text2);vertical-align:middle;}
td.mono-cell{font-family:var(--mono);font-size:11px;color:var(--text3);}
td.amount{font-family:var(--mono);font-size:12px;text-align:right;color:var(--gold2);}
td.amount.recv{color:var(--green2);}

/* BADGES */
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}
.dot.critical{background:var(--red);box-shadow:0 0 5px var(--red);animation:pulse 1.5s infinite;}
.dot.high{background:var(--orange)} .dot.medium{background:var(--gold)} .dot.low{background:var(--low,#6b7280)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
.stage-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600;white-space:nowrap;}
.s02{background:rgba(99,102,241,.15);color:#818cf8;border:1px solid rgba(99,102,241,.3);}
.s03{background:rgba(245,158,11,.1);color:#fbbf24;border:1px solid rgba(245,158,11,.3);}
.s04{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.3);}
.s05{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.3);}
.rb{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600;}
.rb-got{background:rgba(16,185,129,.15);color:var(--green2);}
.rb-not{background:rgba(239,68,68,.15);color:var(--red2);}
.rb-wait{background:rgba(245,158,11,.15);color:var(--gold2);}
.rb-none{color:var(--text3);font-size:11px;}
.sb{display:inline-block;padding:2px 7px;border-radius:12px;font-size:11px;font-weight:600;}
.sb-pending{background:rgba(245,158,11,.15);color:var(--gold2);}
.sb-inprogress{background:rgba(59,130,246,.15);color:var(--accent2);}
.sb-done{background:rgba(16,185,129,.15);color:var(--green2);}
.sb-stuck{background:rgba(239,68,68,.15);color:var(--red2);}
.due-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600;font-family:var(--mono);}
.due-overdue{background:rgba(239,68,68,.2);color:var(--red2);border:1px solid rgba(239,68,68,.3);}
.due-today{background:rgba(245,158,11,.2);color:var(--gold2);border:1px solid rgba(245,158,11,.3);}
.due-soon{background:rgba(59,130,246,.15);color:var(--accent2);border:1px solid rgba(59,130,246,.3);}
.due-ok{background:rgba(16,185,129,.1);color:var(--green2);border:1px solid rgba(16,185,129,.2);}

/* KANBAN */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;align-items:start;}
.kanban-col{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.col-header{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.col-title{font-size:12px;font-weight:600;}
.col-count{font-family:var(--mono);font-size:11px;background:var(--bg3);padding:1px 6px;border-radius:10px;color:var(--text3);}
.kanban-cards{padding:8px;display:flex;flex-direction:column;gap:6px;max-height:65vh;overflow-y:auto;}
.kcard{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:8px;cursor:pointer;transition:all .15s;}
.kcard:hover{border-color:var(--accent);transform:translateY(-1px);}
.kcard.overdue{border-color:rgba(239,68,68,.4);}
.kcard-id{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:3px;}
.kcard-action{font-size:12px;font-weight:600;color:var(--text);margin-bottom:4px;}
.kcard-footer{display:flex;justify-content:space-between;align-items:center;margin-top:4px;}
.kcard-amount{font-family:var(--mono);font-size:11px;color:var(--gold2);}

/* ACTION PLAN */
.rec-panel{background:linear-gradient(135deg,rgba(245,158,11,.07),rgba(59,130,246,.07));border:1px solid rgba(245,158,11,.25);border-radius:10px;padding:16px;margin-bottom:16px;}
.rec-title{font-size:14px;font-weight:700;color:var(--gold2);margin-bottom:10px;}
.rec-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px;}
.rec-card{background:rgba(0,0,0,.3);border:1px solid var(--border2);border-radius:7px;padding:10px;}
.rec-num{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--gold2);}
.rec-label{font-size:12px;color:var(--text2);margin-top:1px;}
.rec-action{font-size:11px;color:var(--accent2);margin-top:4px;font-weight:500;}
.action-plan{display:flex;flex-direction:column;gap:14px;}
.ag{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.ag-header{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer;}
.ag-header:hover{background:rgba(59,130,246,.04);}
.ag-body{padding:8px 14px;display:none;flex-direction:column;gap:6px;}
.ag-body.open{display:flex;}
.ai{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:8px 10px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:all .15s;}
.ai:hover{border-color:var(--border2);}
.ai.overdue{border-left:3px solid var(--red);}
.ai-left{flex:1;min-width:0;}
.ai-id{font-family:var(--mono);font-size:10px;color:var(--text3);}
.ai-action{font-size:12px;font-weight:600;color:var(--text);}
.ai-right{text-align:right;flex-shrink:0;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;width:100%;max-width:700px;max-height:92vh;overflow-y:auto;animation:up .2s ease;}
@keyframes up{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{padding:16px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;}
.modal-close{margin-left:auto;background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;}
.modal-close:hover{color:var(--text);}
.modal-body{padding:16px 18px;}
.sec-title{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.info-row{display:flex;flex-direction:column;gap:2px;}
.info-label{font-size:10px;color:var(--text3);}
.info-value{font-size:13px;color:var(--text);font-weight:500;}
.info-value.mono{font-family:var(--mono);color:var(--gold2);}
.nab{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.3);border-radius:8px;padding:11px;margin-bottom:14px;}
.nab-label{font-size:10px;color:var(--accent2);font-weight:600;letter-spacing:.3px;margin-bottom:4px;}
.nab-text{font-size:13px;font-weight:700;color:var(--text);}
.form-row{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;}
.form-label{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.3px;}
.form-input,.form-select,.form-textarea{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:7px 9px;color:var(--text);font-family:inherit;font-size:13px;outline:none;width:100%;transition:border-color .2s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);}
.form-textarea{resize:vertical;min-height:60px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;}
.btn-row{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap;}
.saved-notes{margin-top:8px;display:flex;flex-direction:column;gap:5px;}
.saved-note{background:var(--bg3);border-left:3px solid var(--accent);padding:6px 9px;border-radius:0 5px 5px 0;font-size:12px;color:var(--text2);position:relative;}
.note-time{font-size:10px;color:var(--text3);margin-bottom:1px;font-family:var(--mono);}
.note-del{position:absolute;right:6px;top:6px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;}
.note-del:hover{color:var(--red2);}
.add-form{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:16px;margin-bottom:16px;}
.add-form-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:14px;}
.loading-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.spinner{width:40px;height:40px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;right:20px;background:var(--bg3);border:1px solid var(--green);color:var(--green2);padding:9px 16px;border-radius:8px;font-size:13px;font-weight:500;z-index:999;animation:fadeInUp .3s ease;pointer-events:none;}
@keyframes fadeInUp{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
::-webkit-scrollbar{width:5px;height:5px} ::-webkit-scrollbar-track{background:var(--bg2)} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.hidden{display:none!important;}
.empty{text-align:center;padding:50px 20px;color:var(--text3);}
@media(max-width:768px){.kpi-bar{grid-template-columns:repeat(2,1fr)}.kanban{grid-template-columns:1fr}.info-grid,.g2,.g3{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="badge">LUCKY LEASING</div>
    <h1>ระบบติดตาม<span>งานบังคับคดี</span></h1>
    <div class="header-right">
      <div class="sync-status loading" id="syncStatus">⟳ กำลังโหลด...</div>
      <button class="btn btn-ghost btn-sm" onclick="loadAll()" title="Refresh">↻ Sync</button>
      <button class="btn btn-green btn-sm" onclick="showAddForm()">＋ เพิ่มเคส</button>
      <button class="btn btn-gold btn-sm" onclick="exportCSV()">⬇ Export</button>
    </div>
  </div>
  <div class="kpi-bar" id="kpiBar"><div class="kpi blue"><div class="kpi-label">กำลังโหลด</div><div class="kpi-value">...</div></div></div>
</div>

<div class="toolbar">
  <div class="search-wrap"><input type="text" id="searchInput" placeholder="ค้นหาเลขที่งาน, สำนวน, ผู้รับผิดชอบ..."></div>
  <select id="filterStage"><option value="">ทุกหมวด</option><option value="02">02 สืบทรัพย์</option><option value="03">03 เตรียมบังคับ</option><option value="04">04 บังคับคดี</option><option value="05">05 ประนอมหนี้</option></select>
  <select id="filterResult"><option value="">ทุกผลอายัด</option><option value="ได้เงิน">✅ ได้เงิน</option><option value="ไม่ได้เงิน">❌ ไม่ได้เงิน</option><option value="รอผล">⏳ รอผล</option></select>
  <select id="filterOwner"><option value="">ทุกคน</option><option value="ไมค์">ไมค์</option><option value="ต่าย">ต่าย</option><option value="ก้อย">ก้อย</option></select>
  <select id="filterDue"><option value="">ทุก Due Date</option><option value="overdue">🔴 เกินกำหนด</option><option value="today">🟡 วันนี้</option><option value="soon">🔵 ใน 7 วัน</option></select>
  <select id="filterStatus"><option value="">ทุกสถานะ</option><option value="pending">⏳ Pending</option><option value="inprogress">🔵 In Progress</option><option value="done">✅ Done</option><option value="stuck">🔴 Stuck</option></select>
  <div class="count-badge">แสดง <span id="countDisplay">0</span> รายการ</div>
</div>

<div class="view-tabs">
  <button class="tab-btn active" onclick="setView('table',this)">📋 ตาราง</button>
  <button class="tab-btn" onclick="setView('kanban',this)">🗂 Kanban</button>
  <button class="tab-btn" onclick="setView('action',this)">⚡ Action Plan</button>
</div>

<div class="main">
  <div id="addFormSection" class="hidden"></div>
  <div id="viewTable"><div class="table-wrap"><table>
    <thead><tr>
      <th onclick="sortBy('priority')">P ↕</th>
      <th onclick="sortBy('id')">เลขที่งาน ↕</th>
      <th>สำนวน</th><th>ผู้รับผิดชอบ</th>
      <th onclick="sortBy('hmvad')">หมวด ↕</th>
      <th>Action ถัดไป</th><th>สถานะ</th>
      <th onclick="sortBy('due_date')">Due Date ↕</th>
      <th onclick="sortBy('amount')">ยอดฟ้อง ↕</th>
      <th>เงินที่ได้</th><th>ผลอายัด</th><th>Edit</th>
    </tr></thead>
    <tbody id="tableBody"></tbody>
  </table></div></div>
  <div id="viewKanban" class="hidden"><div class="kanban" id="kanbanBoard"></div></div>
  <div id="viewAction" class="hidden"><div id="recPanel"></div><div class="action-plan" id="actionPlan"></div></div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent"></div>
</div>

<script>
// ══ CONFIG ══
var API = '/api';  // → /.netlify/functions/cases via redirect

// ══ STATE ══
let ALL = [];
let filtered = [];
let sortCol = 'priority', sortDir = -1, currentView = 'table';

// ══ API ══
async function apiFetch(path, opts={}) {
  const r = await fetch(API + path, {
    headers: {'Content-Type':'application/json'},
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// ══ HELPERS ══
const fmt = n => (!n||n===0) ? '-' : new Intl.NumberFormat('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n);
function stageClass(s){ const m={'02':'s02','03':'s03','04':'s04','05':'s05'}; return m[(s||'').substring(0,2)]||''; }
function stageLabel(s){ const m={'02สืบทรัพย์':'สืบทรัพย์','03เตรียมบังคับคดี':'เตรียมบังคับ','04บังคับคดี':'บังคับคดี','05ประนอมหนี้':'ประนอมหนี้'}; return m[s]||(s||'').replace(/^\d+/,'').trim(); }
function resultBadge(r){ if(r==='ได้เงิน') return '<span class="rb rb-got">✅ ได้เงิน</span>'; if(r&&r.includes('ไม่ได้เงิน')) return '<span class="rb rb-not">❌ ไม่ได้เงิน</span>'; if(r==='รอผล') return '<span class="rb rb-wait">⏳ รอผล</span>'; return '<span class="rb-none">—</span>'; }
function statusBadge(s){ const m={pending:'<span class="sb sb-pending">⏳ Pending</span>',inprogress:'<span class="sb sb-inprogress">🔵 In Progress</span>',done:'<span class="sb sb-done">✅ Done</span>',stuck:'<span class="sb sb-stuck">🔴 Stuck</span>'}; return m[s]||'<span class="rb-none">—</span>'; }
function dueBadge(due){
  if(!due) return '<span class="rb-none">—</span>';
  const today=new Date(); today.setHours(0,0,0,0);
  const d=new Date(due); d.setHours(0,0,0,0);
  const diff=Math.round((d-today)/864e5);
  const lbl=d.toLocaleDateString('th-TH',{day:'2-digit',month:'short',year:'2-digit'});
  if(diff<0) return `<span class="due-badge due-overdue">🔴 ${lbl}</span>`;
  if(diff===0) return `<span class="due-badge due-today">🟡 วันนี้</span>`;
  if(diff<=7) return `<span class="due-badge due-soon">🔵 ${lbl}</span>`;
  return `<span class="due-badge due-ok">${lbl}</span>`;
}
function isOverdue(r){ if(!r.due_date) return false; const t=new Date(); t.setHours(0,0,0,0); return new Date(r.due_date)<t && r.action_status!=='done'; }
function toast(msg,color='var(--green)'){const t=document.createElement('div');t.className='toast';t.style.borderColor=color;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500);}
function setSyncStatus(state,msg){ const el=document.getElementById('syncStatus'); el.className='sync-status '+state; el.textContent=msg; }

// ══ LOAD ══
async function loadAll() {
  setSyncStatus('loading','⟳ กำลังโหลด...');
  try {
    const [casesRes, statsRes] = await Promise.all([
      apiFetch('/?' + buildQueryString()),
      apiFetch('/stats')
    ]);
    ALL = casesRes.cases || [];
    filtered = [...ALL];
    applyLocalFilters();
    renderKPI(statsRes);
    setSyncStatus('ok', `✓ อัพเดท ${new Date().toLocaleTimeString('th-TH')}`);
  } catch(e) {
    setSyncStatus('err', '✕ โหลดไม่ได้');
    console.error(e);
  }
}

function buildQueryString() {
  const p = new URLSearchParams();
  const q = document.getElementById('searchInput').value;
  const stage = document.getElementById('filterStage').value;
  const result = document.getElementById('filterResult').value;
  const owner = document.getElementById('filterOwner').value;
  const due = document.getElementById('filterDue').value;
  const status = document.getElementById('filterStatus').value;
  if(q) p.set('q', q);
  if(stage) p.set('stage', stage);
  if(result) p.set('result', result);
  if(owner) p.set('owner', owner);
  if(due) p.set('due', due);
  if(status) p.set('status', status);
  return p.toString();
}

function applyLocalFilters() {
  let sortedFiltered = [...ALL];
  sortData(sortedFiltered);
  filtered = sortedFiltered;
  document.getElementById('countDisplay').textContent = filtered.length;
  renderCurrent();
}

      </div>

  const icons={'ตรวจรับรองบัญชี/ขอรับเงิน':'💰','บันทึกผลการอายัด':'✅','ยื่นอายัดทรัพย์':'📤','ตรวจอายัดซ้ำ':'🔍','ออกหมายตั้ง':'📬','ส่งคำบังคับ':'📨','สืบทรัพย์ใหม่':'🔄','สืบทรัพย์ที่ดิน':'🏠','สืบทรัพย์เงินเดือน':'💼','สืบทรัพย์บัญชี':'🏦','ยื่นขอยึดทรัพย์':'🏛️','ประนอมหนี้':'🤝'};
  const sorted = Object.entries(groups).sort((a,b)=>b[1].reduce((x,r)=>x+parseFloat(r.amount||0),0)-a[1].reduce((x,r)=>x+parseFloat(r.amount||0),0));
  document.getElementById('actionPlan').innerHTML = sorted.map(([action,items]) => {

        <div style="margin-left:auto;text-align:right"><div style="font-family:var(--mono);font-size:12px;color:var(--gold2);font-weight:600">฿${total.toLocaleString('th-TH',{maximumFractionDigits:0})}</div><div style="font-size:10px;color:var(--text3)">▾</div></div>
      </div>

          </div>

async function saveNote(caseId) {
  const inp = document.getElementById('noteInput_'+caseId);
  if(!inp||!inp.value.trim()) return;
  try {
    const note = await apiFetch('/'+caseId+'/notes', {method:'POST', body:{text:inp.value.trim()}});
    const r = ALL.find(x=>x.id===caseId);
    if(r){ if(!r.notes) r.notes=[]; r.notes.unshift({id:note.id,text:note.note_text,time:note.created_at}); }
    inp.value='';
    const cont = document.getElementById('saveNotes_'+caseId);
    openModal(caseId);
    toast('📝 บันทึกแล้ว');
  } catch(e) { toast('❌ '+e.message,'var(--red)'); }
}

async function delNote(caseId, noteId) {
  try {
    await apiFetch('/'+caseId+'/notes/'+noteId, {method:'DELETE'});
    const r = ALL.find(x=>x.id===caseId);
    if(r&&r.notes) r.notes = r.notes.filter(n=>n.id!==noteId);
    openModal(caseId);
    toast('🗑 ลบบันทึกแล้ว','var(--orange)');
  } catch(e) { toast('❌ '+e.message,'var(--red)'); }
}

async function addCase() {

function sortBy(col){ if(sortCol===col) sortDir*=-1; else{sortCol=col;sortDir=-1;} applyLocalFilters(); }
function sortData(arr){ arr.sort((a,b)=>{ let va=a[sortCol],vb=b[sortCol]; if(!va&&!vb) return 0; if(!va) return 1; if(!vb) return -1; if(typeof va==='number'||!isNaN(parseFloat(va))) return(parseFloat(va)-parseFloat(vb))*sortDir; return String(va).localeCompare(String(vb),'th')*sortDir; }); }
function setView(v,btn){ currentView=v; document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); ['viewTable','viewKanban','viewAction'].forEach(id=>{ document.getElementById(id).classList.toggle('hidden',!id.includes(v==='table'?'Table':v==='kanban'?'Kanban':'Action')); }); renderCurrent(); }
function renderCurrent(){ if(currentView==='table') renderTable(); else if(currentView==='kanban') renderKanban(); else renderActionPlan(); }
function closeModal(e){ if(!e||e.target===document.getElementById('modalOverlay')) document.getElementById('modalOverlay').classList.remove('open'); }
document.addEventListener('keydown',e=>{if(e.key==='Escape') closeModal();});

function exportCSV(){
  const h=['เลขที่งาน','สำนวน','ผู้รับผิดชอบ','หมวด','Action','สถานะ','Due Date','ยอดฟ้อง','เงินที่ได้','ผลอายัด'];
  const rows=filtered.map(r=>[r.id,r.sanuan,r.owner,r.hmvad,r.action,r.action_status,r.due_date||'',r.amount,r.money_recv,r.result].join(','));
  const blob=new Blob(['\uFEFF'+[h.join(','),...rows].join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='enforcement_'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
}

async function seedDatabase() {
  if(!confirm(`จะ import ${SEED_DATA.length} เคสเข้า Neon ใช่ไหม?\nควรรันแค่ครั้งเดียวเท่านั้น`)) return;
  try {
    // Step 1: init tables
    let r = await fetch('/.netlify/functions/cases/init', {method:'POST', headers:{'Content-Type':'application/json'}, body:'{}'});
    let d = await r.json(); console.log('Init:', d);
    // Step 2: seed in batches of 50
    const batch = 50;
    for(let i=0; i<SEED_DATA.length; i+=batch) {
      const chunk = SEED_DATA.slice(i,i+batch);
      r = await fetch('/.netlify/functions/cases/seed', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({cases:chunk})});
      d = await r.json(); console.log(`Seeded ${i+chunk.length}/${SEED_DATA.length}:`, d);
    }
    alert('✅ Import สำเร็จ! รีโหลดหน้านี้ได้เลย');
    location.reload();
  } catch(e) { alert('❌ Error: '+e.message); }
}
// ── Reset (ใช้เมื่อต้องการล้างข้อมูลทั้งหมด) ──
async function resetDatabase() {
  if(!confirm('⚠️ จะลบข้อมูลทั้งหมดใน Neon ใช่ไหม? ไม่สามารถกู้คืนได้')) return;
  // ทำผ่าน Neon console โดยตรงแทน
  alert('กรุณาไป Neon console แล้วรัน: TRUNCATE enforcement_cases CASCADE;');
}
